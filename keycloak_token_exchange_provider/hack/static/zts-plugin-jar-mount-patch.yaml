spec:
  template:
    spec:
      volumes:
      - name: temp-plugin-volume
        emptyDir: {}
      initContainers:
      - name: fetch-keycloak-plugin
        image: ghcr.io/mlajkim/keycloak-token-exchange-provider:latest
        imagePullPolicy: Always
        volumeMounts:
        - name: temp-plugin-volume
          mountPath: /export

      containers:
      - name: athenz-zts-server
        volumeMounts:
        - name: temp-plugin-volume
          mountPath: /opt/athenz/zts/lib/jars/keycloak-token-provider.jar
          subPath: keycloak-token-provider.jar
